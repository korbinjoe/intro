<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korbin Joe</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.svg">
  <meta name="description" content="Korbin Joe — building OpenTeam, your AI agent team in minutes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
  :root {
    --bg: #0c0c0c;
    --surface: #111111;
    --border: #2a2a2a;
    --text: #e6e6e6;
    --muted: #6e7681;
    --prompt-user: #79c0ff;
    --prompt-host: #7ee787;
    --prompt-path: #d2a8ff;
    --prompt-symbol: #8b949e;
    --cmd: #ffa657;
    --output: #c9d1d9;
    --accent: #3fb950;
    --link: #58a6ff;
    --error: #ff7b72;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    line-height: 1.6;
  }

  .shell {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 52rem;
    margin: 0 auto;
    padding: clamp(1rem, 4vw, 2rem);
  }

  .banner {
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 1.5rem;
    white-space: pre-line;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1rem;
  }

  .banner em {
    color: var(--accent);
    font-style: normal;
  }

  #history {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    font-size: clamp(0.8125rem, 2.5vw, 0.875rem);
  }

  .entry {
    animation: fade-in 0.2s ease-out;
  }

  .prompt-line {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    word-break: break-all;
  }

  .prompt-line .user { color: var(--prompt-user); }
  .prompt-line .at,
  .prompt-line .symbol { color: var(--prompt-symbol); }
  .prompt-line .host { color: var(--prompt-host); }
  .prompt-line .path { color: var(--prompt-path); }
  .prompt-line .cmd { color: var(--cmd); margin-left: 0.35rem; }

  .output {
    color: var(--output);
    white-space: pre-wrap;
    word-break: break-word;
    padding-left: 0;
    margin: 0.15rem 0 0.65rem;
  }

  .output.muted { color: var(--muted); }
  .output.success { color: var(--accent); }

  .output a {
    color: var(--link);
    text-decoration: none;
    border-bottom: 1px dashed rgba(88, 166, 255, 0.35);
  }

  .output a:hover {
    color: #79c0ff;
    border-bottom-color: #79c0ff;
  }

  .input-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 0.25rem;
    font-size: clamp(0.8125rem, 2.5vw, 0.875rem);
  }

  .input-row input {
    flex: 1;
    min-width: 8rem;
    background: transparent;
    border: none;
    outline: none;
    color: var(--cmd);
    font: inherit;
    caret-color: var(--accent);
    padding: 0;
    margin-left: 0.35rem;
  }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1.05em;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  .cursor.off { opacity: 0; animation: none; }

  .hint {
    margin-top: 1.25rem;
    font-size: 0.6875rem;
    color: var(--muted);
  }

  .hint kbd {
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 0.05rem 0.35rem;
    font: inherit;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .entry { animation: none; }
    .cursor { animation: none; }
  }
  </style>
</head>

<body>
  <div class="shell">
    <p class="banner" aria-hidden="true">korbin-joe shell v1.0.0
Type <em>help</em> for commands · <em>clear</em> to reset</p>

    <div id="history" aria-live="polite" aria-label="Terminal output"></div>

    <form class="input-row" id="form" autocomplete="off">
      <label class="prompt-line" for="input" id="prompt-label">
        <span class="user">korbin</span><span class="at">@</span><span class="host">openteam</span>
        <span class="symbol">:</span><span class="path">~</span><span class="symbol">$</span>
      </label>
      <input id="input" type="text" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="Terminal command input">
    </form>

    <p class="hint">Try: <kbd>help</kbd> <kbd>about</kbd> <kbd>openteam</kbd> <kbd>links</kbd> <kbd>contact</kbd></p>
  </div>

  <script>
  const DATA = {
    name: "Korbin Joe",
    slug: "Korbin Joe",
    about: "Hi, I am Korbin Joe.\nI am building OpenTeam.",
    openteam: "Build your AI agent team with OpenTeam, leveraging Claude, Codex,\nand similar technologies in minutes.",
    openteamUrl: "https://github.com/korbinjoe/openteam",
    links: [
      { name: "github", url: "https://github.com/korbinjoe", label: "Github" },
      { name: "twitter", url: "https://twitter.com/korbinjoe", label: "Twitter" },
    ],
    email: "1031700027@qq.com",
  };

  const history = document.getElementById("history");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const typeSpeed = reducedMotion ? 0 : 38;
  const lineDelay = reducedMotion ? 0 : 320;

  const bootSequence = [
    { cmd: "whoami", run: () => DATA.slug },
    { cmd: "cat about.txt", run: () => DATA.about },
    { cmd: "openteam --info", run: () => formatOpenteam() },
    { cmd: "links --list", run: () => formatLinks() },
    { cmd: "contact", run: () => DATA.email },
  ];

  function promptHtml() {
    return `<span class="user">korbin</span><span class="at">@</span><span class="host">openteam</span><span class="symbol">:</span><span class="path">~</span><span class="symbol">$</span>`;
  }

  function formatOpenteam() {
    return `${DATA.openteam}\n\n→ ${DATA.openteamUrl}`;
  }

  function formatLinks() {
    const pad = Math.max(...DATA.links.map((l) => l.name.length)) + 2;
    return DATA.links
      .map((l) => `${l.name.padEnd(pad)} ${l.url}`)
      .join("\n");
  }

  function formatLinksHtml() {
    const pad = Math.max(...DATA.links.map((l) => l.name.length)) + 2;
    return DATA.links
      .map((l) => `${l.name.padEnd(pad)} <a href="${l.url}" target="_blank" rel="noopener noreferrer">${l.url}</a>`)
      .join("\n");
  }

  function scrollBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: reducedMotion ? "auto" : "smooth" });
  }

  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  function addEntry(html, className = "entry") {
    const el = document.createElement("div");
    el.className = className;
    el.innerHTML = html;
    history.appendChild(el);
    scrollBottom();
    return el;
  }

  async function typeText(el, text, speed = typeSpeed) {
    if (speed === 0) {
      el.textContent = text;
      return;
    }
    for (const char of text) {
      el.textContent += char;
      scrollBottom();
      await sleep(speed + Math.random() * 18);
    }
  }

  async function runCommand(cmd, outputFn, { interactive = false, htmlOutput = null } = {}) {
    const entry = addEntry("");
    const promptLine = document.createElement("div");
    promptLine.className = "prompt-line";
    promptLine.innerHTML = promptHtml();

    const cmdSpan = document.createElement("span");
    cmdSpan.className = "cmd";
    promptLine.appendChild(cmdSpan);
    entry.appendChild(promptLine);

    if (interactive) {
      cmdSpan.textContent = cmd;
    } else {
      await typeText(cmdSpan, cmd);
      await sleep(lineDelay);
    }

    const raw = outputFn();
    if (raw === null || raw === undefined) return;

    const out = document.createElement("pre");
    out.className = "output";
    entry.appendChild(out);

    if (htmlOutput) {
      out.innerHTML = htmlOutput;
    } else if (interactive || reducedMotion) {
      out.textContent = raw;
    } else {
      await typeText(out, raw, 12);
    }

    scrollBottom();
  }

  function execute(cmd) {
    const c = cmd.trim().toLowerCase();

    if (!c) return null;

    if (c === "clear") {
      history.innerHTML = "";
      return null;
    }

    if (c === "help") {
      return [
        "Available commands:",
        "  whoami        Show username",
        "  about         Personal intro",
        "  openteam      OpenTeam project info",
        "  links         Social profiles",
        "  contact       Email address",
        "  clear         Clear terminal",
        "  help          Show this message",
      ].join("\n");
    }

    if (c === "whoami") return DATA.slug;
    if (c === "about" || c === "cat about.txt") return DATA.about;
    if (c === "openteam" || c === "openteam --info") return { text: formatOpenteam(), html: formatOpenteamHtml() };
    if (c === "links" || c === "links --list") return { text: formatLinks(), html: formatLinksHtml() };
    if (c === "contact") return { text: DATA.email, html: `<a href="mailto:${DATA.email}">${DATA.email}</a>` };

    return { error: true, text: `command not found: ${cmd}\nTry 'help' for available commands.` };
  }

  function formatOpenteamHtml() {
    return `${DATA.openteam}\n\n→ <a href="${DATA.openteamUrl}" target="_blank" rel="noopener noreferrer">${DATA.openteamUrl}</a>`;
  }

  async function handleInput(raw) {
    const result = execute(raw);

    if (result === null) {
      if (raw.trim().toLowerCase() === "clear") return;
      return;
    }

    const entry = addEntry("");
    entry.innerHTML = `
      <div class="prompt-line">${promptHtml()}<span class="cmd">${escapeHtml(raw)}</span></div>
    `;

    const out = document.createElement("pre");
    out.className = "output";

    if (result.error) {
      out.classList.add("muted");
      out.textContent = result.text;
    } else if (result.html) {
      out.innerHTML = result.html;
    } else if (typeof result === "object" && result.text) {
      out.textContent = result.text;
    } else {
      out.textContent = result;
    }

    entry.appendChild(out);
    scrollBottom();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function boot() {
    input.disabled = true;

    for (const step of bootSequence) {
      await runCommand(step.cmd, step.run, {
        htmlOutput: step.cmd.startsWith("links")
          ? formatLinksHtml()
          : step.cmd.startsWith("openteam")
            ? formatOpenteamHtml()
            : step.cmd === "contact"
              ? `<a href="mailto:${DATA.email}">${DATA.email}</a>`
              : null,
      });
      await sleep(reducedMotion ? 0 : 480);
    }

    input.disabled = false;
    input.focus();
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const value = input.value;
    input.value = "";
    handleInput(value);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "l" && e.ctrlKey) {
      e.preventDefault();
      history.innerHTML = "";
    }
  });

  boot();
  </script>
</body>

</html>
