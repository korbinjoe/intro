<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korbin Joe</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate icon" href="/favicon.svg">
  <meta name="description" content="Korbin Joe — building TeemAI, your AI agent team in minutes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
  :root {
    /* 中国传统色：玄墨 · 宣纸 · 朱砂 · 石青 · 石绿 · 赤金 · 赭石 */
    --bg: #0b0a08;
    --surface: #141210;
    --surface-elevated: #1a1814;
    --border: rgba(201, 164, 92, 0.2);
    --border-faint: rgba(201, 164, 92, 0.08);
    --text: #ede4d4;
    --muted: #8a8174;
    --prompt-user: #c9a45c;
    --prompt-host: #5c8a7a;
    --prompt-path: #a85a4a;
    --prompt-symbol: #6e685e;
    --cmd: #c4956a;
    --output: #ddd4c4;
    --accent: #b73e2a;
    --link: #5a7a8a;
    --link-hover: #7a9aad;
    --error: #8b3a2f;
    --gold: #c9a45c;
    --mono: "JetBrains Mono", "SF Mono", ui-monospace, monospace;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100dvh;
    background:
      radial-gradient(ellipse 120% 70% at 50% -10%, rgba(183, 62, 42, 0.07), transparent 55%),
      radial-gradient(ellipse 70% 50% at 100% 100%, rgba(92, 138, 122, 0.06), transparent 50%),
      radial-gradient(ellipse 60% 40% at 0% 80%, rgba(201, 164, 92, 0.04), transparent 45%),
      var(--bg);
    color: var(--text);
    font-family: var(--mono);
    line-height: 1.6;
    padding: clamp(1rem, 4vw, 2.5rem);
  }

  .shell {
    position: relative;
    min-height: calc(100dvh - clamp(2rem, 8vw, 5rem));
    display: flex;
    flex-direction: column;
    max-width: 52rem;
    margin: 0 auto;
    padding: clamp(1.25rem, 4vw, 2rem);
    background: linear-gradient(165deg, rgba(26, 24, 20, 0.97) 0%, rgba(14, 12, 10, 0.99) 100%);
    border: 1px solid var(--border);
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.45),
      inset 0 1px 0 var(--border-faint),
      0 28px 56px rgba(0, 0, 0, 0.55);
  }

  .shell::before,
  .shell::after {
    content: "";
    position: absolute;
    width: 14px;
    height: 14px;
    border-color: rgba(201, 164, 92, 0.32);
    border-style: solid;
    pointer-events: none;
  }

  .shell::before {
    top: 10px;
    left: 10px;
    border-width: 1px 0 0 1px;
  }

  .shell::after {
    right: 10px;
    bottom: 10px;
    border-width: 0 1px 1px 0;
  }

  .banner {
    position: relative;
    color: var(--muted);
    font-size: 0.75rem;
    margin-bottom: 1.75rem;
    white-space: pre-line;
    border-bottom: 1px solid var(--border-faint);
    padding-bottom: 1rem;
    letter-spacing: 0.04em;
  }

  .banner::after {
    content: "";
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 2.5rem;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .banner em {
    color: var(--gold);
    font-style: normal;
  }

  #history {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    font-size: clamp(0.8125rem, 2.5vw, 0.875rem);
  }

  .entry {
    animation: fade-in 0.2s ease-out;
  }

  .prompt-line {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    word-break: break-all;
  }

  .prompt-line .user { color: var(--prompt-user); }
  .prompt-line .at,
  .prompt-line .symbol { color: var(--prompt-symbol); }
  .prompt-line .host { color: var(--prompt-host); }
  .prompt-line .path { color: var(--prompt-path); }
  .prompt-line .cmd { color: var(--cmd); margin-left: 0.35rem; }

  .output {
    color: var(--output);
    white-space: pre-wrap;
    word-break: break-word;
    padding-left: 0;
    margin: 0.15rem 0 0.65rem;
  }

  .output.muted { color: var(--muted); }
  .output.success { color: var(--prompt-host); }

  .output a {
    color: var(--link);
    text-decoration: none;
    border-bottom: 1px dashed rgba(90, 122, 138, 0.4);
    transition: color 0.2s ease, border-color 0.2s ease;
  }

  .output a:hover {
    color: var(--link-hover);
    border-bottom-color: var(--link-hover);
  }

  .input-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 0.5rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border-faint);
    font-size: clamp(0.8125rem, 2.5vw, 0.875rem);
  }

  .input-row input {
    flex: 1;
    min-width: 8rem;
    background: transparent;
    border: none;
    outline: none;
    color: var(--cmd);
    font: inherit;
    caret-color: var(--accent);
    padding: 0;
    margin-left: 0.35rem;
  }

  .input-row input::selection {
    background: rgba(183, 62, 42, 0.35);
    color: var(--text);
  }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1.05em;
    background: var(--accent);
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }

  .cursor.off { opacity: 0; animation: none; }

  .hint {
    margin-top: 1.25rem;
    font-size: 0.6875rem;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .hint kbd {
    color: var(--text);
    background: var(--surface-elevated);
    border: 1px solid var(--border-faint);
    border-radius: 2px;
    padding: 0.05rem 0.35rem;
    font: inherit;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .entry { animation: none; }
    .cursor { animation: none; }
  }
  </style>
</head>

<body>
  <div class="shell">
    <p class="banner" aria-hidden="true">korbin-joe shell v1.0.0
Type <em>help</em> for commands · <em>clear</em> to reset</p>

    <div id="history" aria-live="polite" aria-label="Terminal output"></div>

    <form class="input-row" id="form" autocomplete="off">
      <label class="prompt-line" for="input" id="prompt-label">
        <span class="user">korbin</span><span class="at">@</span><span class="host">teemai</span>
        <span class="symbol">:</span><span class="path">~</span><span class="symbol">$</span>
      </label>
      <input id="input" type="text" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="Terminal command input">
    </form>

    <p class="hint">Try: <kbd>help</kbd> <kbd>about</kbd> <kbd>teemai</kbd> <kbd>projects</kbd> <kbd>links</kbd> <kbd>contact</kbd></p>
  </div>

  <script>
  const DATA = {
    name: "Korbin Joe",
    slug: "Korbin Joe",
    about: "Hi, I am Korbin Joe.\nI am building TeemAI.",
    teemaiDesc: "Build your AI agent team with TeemAI, leveraging Claude, Codex,\nand similar technologies in minutes.",
    teemaiUrl: "https://github.com/korbinjoe/TeemAI",
    projects: [
      { name: "TeemAI", url: "https://github.com/korbinjoe/TeemAI", desc: "Build your AI agent team in minutes" },
      { name: "trending8", url: "https://github.com/korbinjoe/trending8", desc: "Trending content aggregator" },
      { name: "toools", url: "https://github.com/korbinjoe/toools", desc: "Developer tools collection" },
      { name: "slides-skill", url: "https://github.com/korbinjoe/slides-skill", desc: "Slide generation skill" },
    ],
    links: [
      { name: "github", url: "https://github.com/korbinjoe", label: "Github" },
      { name: "twitter", url: "https://twitter.com/korbinjoe", label: "Twitter" },
    ],
    email: "1031700027@qq.com",
  };

  const history = document.getElementById("history");
  const form = document.getElementById("form");
  const input = document.getElementById("input");
  const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const typeSpeed = reducedMotion ? 0 : 38;
  const lineDelay = reducedMotion ? 0 : 320;

  const bootSequence = [
    { cmd: "whoami", run: () => DATA.slug },
    { cmd: "cat about.txt", run: () => DATA.about },
    { cmd: "teemai --info", run: () => formatTeemai() },
    { cmd: "projects --active", run: () => formatProjects() },
    { cmd: "links --list", run: () => formatLinks() },
    { cmd: "contact", run: () => DATA.email },
  ];

  function promptHtml() {
    return `<span class="user">korbin</span><span class="at">@</span><span class="host">teemai</span><span class="symbol">:</span><span class="path">~</span><span class="symbol">$</span>`;
  }

  function formatTeemai() {
    return `${DATA.teemaiDesc}\n\n→ ${DATA.teemaiUrl}`;
  }

  function formatProjects() {
    const pad = Math.max(...DATA.projects.map((p) => p.name.length)) + 2;
    return DATA.projects
      .map((p) => `${p.name.padEnd(pad)} ${p.desc}\n${"".padEnd(pad)} ${p.url}`)
      .join("\n\n");
  }

  function formatProjectsHtml() {
    const pad = Math.max(...DATA.projects.map((p) => p.name.length)) + 2;
    return DATA.projects
      .map((p) => `${p.name.padEnd(pad)} ${p.desc}\n${"".padEnd(pad)} <a href="${p.url}" target="_blank" rel="noopener noreferrer">${p.url}</a>`)
      .join("\n\n");
  }

  function formatLinks() {
    const pad = Math.max(...DATA.links.map((l) => l.name.length)) + 2;
    return DATA.links
      .map((l) => `${l.name.padEnd(pad)} ${l.url}`)
      .join("\n");
  }

  function formatLinksHtml() {
    const pad = Math.max(...DATA.links.map((l) => l.name.length)) + 2;
    return DATA.links
      .map((l) => `${l.name.padEnd(pad)} <a href="${l.url}" target="_blank" rel="noopener noreferrer">${l.url}</a>`)
      .join("\n");
  }

  function scrollBottom() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: reducedMotion ? "auto" : "smooth" });
  }

  function sleep(ms) {
    return new Promise((resolve) => setTimeout(resolve, ms));
  }

  function addEntry(html, className = "entry") {
    const el = document.createElement("div");
    el.className = className;
    el.innerHTML = html;
    history.appendChild(el);
    scrollBottom();
    return el;
  }

  async function typeText(el, text, speed = typeSpeed) {
    if (speed === 0) {
      el.textContent = text;
      return;
    }
    for (const char of text) {
      el.textContent += char;
      scrollBottom();
      await sleep(speed + Math.random() * 18);
    }
  }

  async function runCommand(cmd, outputFn, { interactive = false, htmlOutput = null } = {}) {
    const entry = addEntry("");
    const promptLine = document.createElement("div");
    promptLine.className = "prompt-line";
    promptLine.innerHTML = promptHtml();

    const cmdSpan = document.createElement("span");
    cmdSpan.className = "cmd";
    promptLine.appendChild(cmdSpan);
    entry.appendChild(promptLine);

    if (interactive) {
      cmdSpan.textContent = cmd;
    } else {
      await typeText(cmdSpan, cmd);
      await sleep(lineDelay);
    }

    const raw = outputFn();
    if (raw === null || raw === undefined) return;

    const out = document.createElement("pre");
    out.className = "output";
    entry.appendChild(out);

    if (htmlOutput) {
      out.innerHTML = htmlOutput;
    } else if (interactive || reducedMotion) {
      out.textContent = raw;
    } else {
      await typeText(out, raw, 12);
    }

    scrollBottom();
  }

  function execute(cmd) {
    const c = cmd.trim().toLowerCase();

    if (!c) return null;

    if (c === "clear") {
      history.innerHTML = "";
      return null;
    }

    if (c === "help") {
      return [
        "Available commands:",
        "  whoami        Show username",
        "  about         Personal intro",
        "  teemai        TeemAI project info",
        "  projects      Active projects in development",
        "  links         Social profiles",
        "  contact       Email address",
        "  clear         Clear terminal",
        "  help          Show this message",
      ].join("\n");
    }

    if (c === "whoami") return DATA.slug;
    if (c === "about" || c === "cat about.txt") return DATA.about;
    if (c === "teemai" || c === "teemai --info") return { text: formatTeemai(), html: formatTeemaiHtml() };
    if (c === "projects" || c === "projects --active") return { text: formatProjects(), html: formatProjectsHtml() };
    if (c === "links" || c === "links --list") return { text: formatLinks(), html: formatLinksHtml() };
    if (c === "contact") return { text: DATA.email, html: `<a href="mailto:${DATA.email}">${DATA.email}</a>` };

    return { error: true, text: `command not found: ${cmd}\nTry 'help' for available commands.` };
  }

  function formatTeemaiHtml() {
    return `${DATA.teemaiDesc}\n\n→ <a href="${DATA.teemaiUrl}" target="_blank" rel="noopener noreferrer">${DATA.teemaiUrl}</a>`;
  }

  async function handleInput(raw) {
    const result = execute(raw);

    if (result === null) {
      if (raw.trim().toLowerCase() === "clear") return;
      return;
    }

    const entry = addEntry("");
    entry.innerHTML = `
      <div class="prompt-line">${promptHtml()}<span class="cmd">${escapeHtml(raw)}</span></div>
    `;

    const out = document.createElement("pre");
    out.className = "output";

    if (result.error) {
      out.classList.add("muted");
      out.textContent = result.text;
    } else if (result.html) {
      out.innerHTML = result.html;
    } else if (typeof result === "object" && result.text) {
      out.textContent = result.text;
    } else {
      out.textContent = result;
    }

    entry.appendChild(out);
    scrollBottom();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  async function boot() {
    input.disabled = true;

    for (const step of bootSequence) {
      await runCommand(step.cmd, step.run, {
        htmlOutput: step.cmd.startsWith("links")
          ? formatLinksHtml()
          : step.cmd.startsWith("projects")
            ? formatProjectsHtml()
            : step.cmd.startsWith("teemai")
              ? formatTeemaiHtml()
              : step.cmd === "contact"
                ? `<a href="mailto:${DATA.email}">${DATA.email}</a>`
                : null,
      });
      await sleep(reducedMotion ? 0 : 480);
    }

    input.disabled = false;
    input.focus();
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const value = input.value;
    input.value = "";
    handleInput(value);
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "l" && e.ctrlKey) {
      e.preventDefault();
      history.innerHTML = "";
    }
  });

  boot();
  </script>
</body>

</html>
